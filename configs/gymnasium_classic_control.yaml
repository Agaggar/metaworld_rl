# Gymnasium classic control preset (PPO-focused).
# Set env.gym_env_id to one of:
#   Acrobot-v1
#   CartPole-v1
#   MountainCar-v0
algorithm: ppo
total_timesteps: 500000
sample_every: 1
device: cuda:2
seed: 0
reward_scale: 1.0
eval_episodes: 10
checkpoint_dir: runs/gymnasium_classic_control/checkpoints
video_dir: runs/gymnasium_classic_control/videos

env:
  benchmark: MT10
  suite: gymnasium
  robotics_env_id: null
  gym_env_id: CartPole-v1
  num_envs: 4
  seed: 0
  action_scale: 1.0
  normalize_observations: false
  use_one_hot_task_id: false
  max_episode_steps: null
  render_mode: null

model:
  hidden_dims: [256, 256]
  activation: relu

sac:
  lr: 0.0003
  gamma: 0.99
  tau: 0.005
  alpha: 0.2
  auto_alpha: true
  target_entropy: null
  buffer_capacity: 1000000
  batch_size: 256
  warmup_steps: 5000
  updates_per_step: 1
  policy_frequency: 2
  target_network_frequency: 1

ppo:
  lr: 0.00025
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5
  n_steps: 128
  n_epochs: 4
  minibatch_size: 128
  anneal_lr: true
  norm_adv: true
  clip_vloss: true
  target_kl: null

logging:
  use_wandb: false
  wandb_entity: null
  log_interval: 100
  eval_interval: 20000
  checkpoint_interval: 50000
  log_train_metrics: [loss_policy, loss_value, entropy, approx_kl]
  log_eval_metrics: [success_rate, episode_return_mean]
  save_plots: true
  plot_dir: runs/gymnasium_classic_control/plots
  history_csv: runs/gymnasium_classic_control/history.csv
