# Default training run — edit or pass overrides via scripts/train.py
algorithm: sac
total_timesteps: 500000
sample_every: 1
device: cuda:2
seed: 0
reward_scale: 1.0
eval_episodes: 10
checkpoint_dir: runs/tester/checkpoints
video_dir: runs/tester/videos

env:
  benchmark: MT10 # or specify
  num_envs: 10
  seed: 0
  action_scale: 1.0
  normalize_observations: false
  use_one_hot_task_id: false
  max_episode_steps: null
  render_mode: null

model:
  hidden_dims: [256, 256]
  activation: relu

sac:
  lr: 0.0003
  gamma: 0.99
  tau: 0.005
  alpha: 0.2
  auto_alpha: true
  buffer_capacity: 1000000
  batch_size: 256
  warmup_steps: 5000
  updates_per_step: 1

ppo:
  lr: 0.0003
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.0
  vf_coef: 0.5
  max_grad_norm: 0.5
  n_steps: 2048
  n_epochs: 10
  minibatch_size: 256

logging:
  use_wandb: true
  wandb_entity: null
  log_interval: 100
  eval_interval: 20000
  checkpoint_interval: 50000
  log_train_metrics: [loss_critic, loss_actor, alpha, q_gap]
  log_eval_metrics: [success_rate, episode_return_mean]
  save_plots: true
  plot_dir: runs/tester/plots
  history_csv: runs/tester/history.csv
