# Default training run — edit or pass overrides via scripts/train.py
algorithm: sac
total_timesteps: 1000000
sample_every: 1
device: cuda:2
seed: 0
reward_scale: 1.0
eval_episodes: 10
checkpoint_dir: runs/tester/checkpoints
video_dir: runs/tester/videos

env:
  benchmark: MT10 # or specify (metaworld only)
  suite: metaworld # robotics: set suite + robotics_env_id (see configs/robotics_shadow_touch_block.yaml)
  robotics_env_id: null
  gym_env_id: null
  num_envs: 1
  seed: 0
  action_scale: 1.0
  normalize_observations: true
  use_one_hot_task_id: false
  max_episode_steps: null
  render_mode: null

model:
  hidden_dims: [256, 256]
  activation: relu

sac:
  lr: 0.0003
  gamma: 0.99
  tau: 0.005
  alpha: 0.2
  auto_alpha: true
  target_entropy: -2.0
  buffer_capacity: 1000000
  batch_size: 256
  warmup_steps: 5000
  updates_per_step: 1
  policy_frequency: 2
  target_network_frequency: 1

ppo:
  lr: 0.0003
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5
  n_steps: 512           # ↓ 4x reduction (from 2048)
  n_epochs: 5
  minibatch_size: 64     # ↓ Smaller batches for more updates (512 → 64)
  anneal_lr: true
  norm_adv: true
  clip_vloss: true
  target_kl: 0.02

logging:
  use_wandb: false
  wandb_entity: null
  log_interval: 200
  eval_interval: 20000
  checkpoint_interval: 50000
  log_train_metrics: [loss_critic, loss_actor, alpha, q_gap]
  log_eval_metrics: [success_rate, episode_return_mean]
  save_plots: true
  plot_dir: runs/tester/plots
  history_csv: runs/tester/history.csv
